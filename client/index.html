<!DOCTYPE html>
<html class="lw-dark" lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LittleWar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lw-background: #10102e;
      --lw-on-background: #e2dfff;
      --lw-surface: #10102e;
      --lw-surface-container-low: #181836;
      --lw-surface-container-high: #272746;
      --lw-surface-container-highest: #313251;
      --lw-surface-variant: #313251;
      --lw-outline-variant: #414754;
      --lw-outline: #8b90a0;
      --lw-on-surface: #e2dfff;
      --lw-on-surface-variant: #c1c6d6;
      --lw-primary: #adc6ff;
      --lw-primary-container: #4b8eff;
      --lw-on-primary: #002e69;
      --lw-secondary-fixed-dim: #fabd00;
      --lw-tertiary: #ffb5a0;
      --lw-error: #ffb4ab;
      --lw-error-container: #93000a;
      --lw-deep-0: #0a0a28;
      --lw-deep-2: #181836;
      --lw-title-blue: #60a5fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html.lw-dark, body {
      background: var(--lw-background);
      overflow: hidden;
      font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif;
      color: var(--lw-on-background);
    }

    canvas { display: block; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 1.25rem;
      line-height: 1;
      user-select: none;
    }

    .lw-cloud-blur { filter: blur(80px); }

    /* ── Lobby shell ───────────────────────────────── */
    #lobby {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .lw-lobby-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .lw-lobby-bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, var(--lw-deep-0) 0%, var(--lw-background) 45%, var(--lw-deep-2) 100%);
    }

    .lw-lobby-orb {
      position: absolute;
      border-radius: 50%;
      opacity: 1;
    }

    .lw-lobby-orb--1 {
      bottom: -5rem;
      left: -5rem;
      width: 600px;
      height: 600px;
      background: color-mix(in srgb, var(--lw-primary) 5%, transparent);
    }

    .lw-lobby-orb--2 {
      top: 25%;
      right: -10rem;
      width: 800px;
      height: 800px;
      background: color-mix(in srgb, var(--lw-secondary-fixed-dim) 5%, transparent);
    }

    .lw-lobby-star {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .lw-lobby-star--1 { top: 5rem; left: 25%; width: 8px; height: 8px; background: #fff; opacity: 0.4; animation: lw-pulse 2s ease-in-out infinite; }
    .lw-lobby-star--2 { top: 10rem; right: 33%; width: 12px; height: 12px; background: #ffdf9e; opacity: 0.6; }
    .lw-lobby-star--3 { bottom: 28%; left: 2.5rem; width: 8px; height: 8px; background: var(--lw-primary); opacity: 0.3; }
    .lw-lobby-star--4 { top: 50%; right: 2.5rem; width: 8px; height: 8px; background: var(--lw-tertiary); opacity: 0.4; animation: lw-pulse 2.5s ease-in-out infinite; }

    @keyframes lw-pulse {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(1.05); }
    }

    .lw-lobby-header {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      flex-shrink: 0;
    }

    .lw-brand {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      font-style: italic;
      letter-spacing: -0.03em;
      color: var(--lw-title-blue);
      text-shadow: 0 0 20px rgba(173, 198, 255, 0.35);
    }

    .lw-lobby-main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      min-height: 0;
    }

    #lobby-box {
      width: 100%;
      max-width: 36rem;
      background: color-mix(in srgb, var(--lw-surface-container-low) 80%, transparent);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid color-mix(in srgb, var(--lw-outline-variant) 15%, transparent);
      border-radius: 1rem;
      padding: 2.25rem 2.5rem;
      text-align: center;
      color: var(--lw-on-surface);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 1.75rem;
    }

    #lobby-box .lw-hero-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
      color: var(--lw-title-blue);
      filter: drop-shadow(0 10px 10px rgba(75, 142, 255, 0.3));
      margin: 0;
    }

    #lobby-box .lw-hero-sub {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--lw-primary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin: 0.35rem 0 0;
    }

    #lobby-box .lw-fields {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      text-align: left;
    }

    .lw-label {
      display: block;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--lw-on-surface-variant);
      margin: 0 0 0.5rem 0.5rem;
    }

    .lw-input-wrap {
      position: relative;
    }

    #lobby-box input[type="text"] {
      width: 100%;
      padding: 1rem 3rem 1rem 1.5rem;
      border-radius: 1rem;
      border: none;
      background: var(--lw-surface-container-highest);
      color: var(--lw-on-surface);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      outline: none;
      transition: box-shadow 0.2s;
    }

    #lobby-box input[type="text"]::placeholder {
      color: color-mix(in srgb, var(--lw-on-surface-variant) 40%, transparent);
    }

    #lobby-box input[type="text"]:focus {
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--lw-primary) 20%, transparent);
    }

    .lw-input-wrap .material-symbols-outlined {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--lw-primary);
      opacity: 0.45;
      pointer-events: none;
      font-size: 1.35rem;
    }

    #color-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    #model-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
    }

    .model-btn {
      border: 1px solid color-mix(in srgb, var(--lw-outline-variant) 35%, transparent);
      background: color-mix(in srgb, var(--lw-surface-container-highest) 85%, transparent);
      color: var(--lw-on-surface);
      border-radius: 9999px;
      padding: 0.55rem 1rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .model-btn:hover {
      border-color: color-mix(in srgb, var(--lw-primary) 60%, transparent);
      transform: translateY(-1px);
    }

    .model-btn.selected {
      border-color: var(--lw-primary-container);
      background: color-mix(in srgb, var(--lw-primary-container) 25%, var(--lw-surface-container-highest));
      color: #ffffff;
    }

    .color-btn {
      width: 3rem;
      height: 3rem;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 0 4px var(--lw-surface-container-low);
      outline: 4px solid transparent;
      outline-offset: 4px;
      transition: transform 0.12s ease, outline-color 0.2s ease;
    }

    .color-btn:hover {
      outline-color: color-mix(in srgb, var(--lw-primary) 45%, transparent);
    }

    .color-btn.selected {
      outline-color: var(--lw-primary-container);
      transform: scale(1.05);
    }

    .color-btn:active { transform: scale(0.92); }

    #play-btn {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 1.35rem 1rem;
      border-radius: 1rem;
      border: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 900;
      font-size: 1.75rem;
      letter-spacing: 0.02em;
      color: var(--lw-on-primary);
      background: linear-gradient(135deg, var(--lw-primary), var(--lw-primary-container));
      box-shadow: 0 20px 40px rgba(75, 142, 255, 0.4);
      transition: transform 0.15s ease;
    }

    #play-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    #play-btn:hover:not(:disabled) {
      transform: scale(1.02);
    }

    #play-btn:hover:not(:disabled)::before {
      opacity: 1;
    }

    #play-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    #play-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      filter: grayscale(0.3);
    }

    .lw-online-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      align-self: center;
      padding: 0.4rem 1.25rem;
      border-radius: 9999px;
      background: color-mix(in srgb, var(--lw-surface-container-highest) 50%, transparent);
      border: 1px solid color-mix(in srgb, var(--lw-outline-variant) 10%, transparent);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--lw-secondary-fixed-dim);
    }

    .lw-ping-wrap {
      position: relative;
      display: inline-flex;
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .lw-ping-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--lw-secondary-fixed-dim);
      animation: lw-ping 1.2s cubic-bezier(0, 0, 0.2, 1) infinite;
      opacity: 0.75;
    }

    .lw-ping-dot {
      position: relative;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--lw-secondary-fixed-dim);
    }

    @keyframes lw-ping {
      75%, 100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    #lobby-msg {
      min-height: 1.25rem;
      font-size: 0.85rem;
      color: var(--lw-error);
      text-align: center;
    }

    /* ── HUD ───────────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      display: none;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    #hud-top {
      position: absolute;
      top: 1rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 1.25rem;
      gap: 0.75rem;
    }

    .hud-pill {
      background: color-mix(in srgb, var(--lw-surface-container-low) 75%, transparent);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--lw-on-surface);
      padding: 0.45rem 1rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid color-mix(in srgb, var(--lw-outline-variant) 12%, transparent);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      letter-spacing: 0.02em;
    }

    #hud-bottom {
      position: absolute;
      bottom: 1rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.65rem;
      padding: 0 1rem;
    }

    #hud-players {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      max-width: 11rem;
      background: color-mix(in srgb, var(--lw-surface-container-low) 78%, transparent);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1rem;
      padding: 0.65rem 0.9rem;
      color: var(--lw-on-surface);
      font-size: 0.78rem;
      border: 1px solid color-mix(in srgb, var(--lw-outline-variant) 12%, transparent);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
    }

    #hud-players h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--lw-on-surface-variant);
      margin-bottom: 0.45rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .player-entry {
      margin-bottom: 0.2rem;
      font-weight: 500;
    }

    #target-arrow {
      position: absolute;
      font-size: 1.6rem;
      pointer-events: none;
      color: #fb923c;
      filter: drop-shadow(0 0 6px rgba(251, 146, 60, 0.85));
      transition: transform 0.08s linear;
      z-index: 20;
    }

    #hud-bomb-toast {
      position: absolute;
      left: 50%;
      top: 20%;
      transform: translateX(-50%) translateY(-10px);
      max-width: min(22rem, calc(100% - 2rem));
      padding: 0.65rem 1.35rem;
      border-radius: 9999px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
      color: #0f172a;
      background: linear-gradient(135deg, #fde047 0%, #fbbf24 55%, #f59e0b 100%);
      border: 1px solid color-mix(in srgb, #fef08a 70%, transparent);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.08),
        0 12px 40px rgba(245, 158, 11, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      z-index: 25;
    }

    #hud-bomb-toast.hud-toast--visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Morte ────────────────────────────────────── */
    #death-screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      background: color-mix(in srgb, var(--lw-error-container) 55%, var(--lw-deep-0));
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #death-box {
      max-width: 22rem;
      width: calc(100% - 2rem);
      background: color-mix(in srgb, var(--lw-surface-container-low) 88%, transparent);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 1rem;
      padding: 2rem 1.75rem;
      text-align: center;
      color: var(--lw-on-surface);
      border: 1px solid color-mix(in srgb, var(--lw-error) 25%, transparent);
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.45);
    }

    #death-box h2 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--lw-error);
    }

    #death-box p {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: color-mix(in srgb, var(--lw-error) 85%, var(--lw-on-surface));
    }
  </style>
</head>
<body>
  <!-- Lobby -->
  <div id="lobby">
    <div class="lw-lobby-bg" aria-hidden="true">
      <div class="lw-lobby-bg-gradient"></div>
      <div class="lw-lobby-orb lw-lobby-orb--1 lw-cloud-blur"></div>
      <div class="lw-lobby-orb lw-lobby-orb--2 lw-cloud-blur"></div>
      <div class="lw-lobby-star lw-lobby-star--1"></div>
      <div class="lw-lobby-star lw-lobby-star--2"></div>
      <div class="lw-lobby-star lw-lobby-star--3"></div>
      <div class="lw-lobby-star lw-lobby-star--4"></div>
    </div>

    <header class="lw-lobby-header">
      <div class="lw-brand">Little War</div>
    </header>

    <div class="lw-lobby-main">
      <div id="lobby-box">
        <div>
          <h1 class="lw-hero-title">LITTLEWAR</h1>
          <p class="lw-hero-sub">Sali a bordo e spara a tutti</p>
        </div>

        <div class="lw-fields">
          <div>
            <label class="lw-label" for="nickname">Nickname</label>
            <div class="lw-input-wrap">
              <input type="text" id="nickname" maxlength="16" placeholder="Pilota_777" autocomplete="username" />
              <span class="material-symbols-outlined" aria-hidden="true">edit</span>
            </div>
          </div>

          <div>
            <label class="lw-label">Colore aereo</label>
            <div id="color-options"></div>
          </div>

          <div>
            <label class="lw-label">Modello</label>
            <div id="model-options"></div>
          </div>
        </div>

        <button type="button" id="play-btn">GIOCA</button>

        <div class="lw-online-pill">
          <span class="lw-ping-wrap" aria-hidden="true"><span class="lw-ping-dot"></span></span>
          <span id="online-count">Online: …</span>
        </div>
        <div id="lobby-msg"></div>
      </div>
    </div>
  </div>

  <!-- HUD (visibile in gioco) -->
  <div id="hud">
    <div id="hud-top">
      <div class="hud-pill" id="hud-kills">Kill: 0</div>
      <div class="hud-pill" id="hud-bombs">Bombe: 0</div>
    </div>
    <div id="hud-bottom">
      <div class="hud-pill" id="hud-weapon">Arma: Lv.0</div>
      <div class="hud-pill" id="hud-shield">Scudo: ✗</div>
      <div class="hud-pill" id="hud-speed">Velocità: 100%</div>
    </div>
    <div id="hud-players">
      <h3>Giocatori</h3>
      <div id="player-list"></div>
    </div>
    <div id="target-arrow">🎯</div>
    <div id="hud-bomb-toast" role="status" aria-live="polite"></div>
  </div>

  <!-- Schermata morte -->
  <div id="death-screen">
    <div id="death-box">
      <h2 id="death-msg">Sei stato eliminato!</h2>
      <p id="death-countdown">Respawn in 3…</p>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
