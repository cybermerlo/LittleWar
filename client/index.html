<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LittleWar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    /* ── Lobby ────────────────────────────────────── */
    #lobby {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,20,0.85);
      z-index: 100;
    }
    #lobby-box {
      background: rgba(10,10,40,0.95);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 36px 44px;
      text-align: center;
      color: #fff;
      min-width: 320px;
    }
    #lobby-box h1 { font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 8px; color: #7ef; }
    #lobby-box p.sub { font-size: 0.85rem; color: #aaa; margin-bottom: 28px; }
    #lobby-box label { display: block; text-align: left; font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
    #lobby-box input[type=text] {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07); color: #fff; font-size: 1rem;
      margin-bottom: 20px; outline: none;
    }
    #color-options { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .color-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; transition: transform 0.1s;
    }
    .color-btn.selected { border-color: #fff; transform: scale(1.2); }
    #play-btn {
      width: 100%; padding: 12px; border-radius: 10px;
      background: #2a7ef7; color: #fff; font-size: 1.1rem; font-weight: 700;
      border: none; cursor: pointer; letter-spacing: 2px;
      transition: background 0.2s;
    }
    #play-btn:hover:not(:disabled) { background: #3a8eff; }
    #play-btn:disabled { background: #555; cursor: not-allowed; }
    #online-count { margin-top: 14px; font-size: 0.8rem; color: #aaa; }
    #lobby-msg { margin-top: 10px; font-size: 0.85rem; color: #f88; min-height: 20px; }

    /* ── HUD ──────────────────────────────────────── */
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      z-index: 10; display: none;
    }
    #hud-top {
      position: absolute; top: 16px; left: 0; right: 0;
      display: flex; justify-content: space-between; padding: 0 20px;
    }
    .hud-pill {
      background: rgba(0,0,0,0.55); color: #fff;
      padding: 6px 14px; border-radius: 20px; font-size: 0.85rem;
    }
    #hud-bottom {
      position: absolute; bottom: 16px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 12px; padding: 0 20px;
    }
    #hud-players {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.55); border-radius: 10px;
      padding: 10px 14px; color: #fff; font-size: 0.8rem;
      max-width: 160px;
    }
    #hud-players h3 { font-size: 0.7rem; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .player-entry { margin-bottom: 3px; }
    #target-arrow {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.6rem; pointer-events: none;
      filter: drop-shadow(0 0 4px #f80);
      transition: transform 0.1s;
    }

    /* ── Morte ────────────────────────────────────── */
    #death-screen {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: rgba(80,0,0,0.6); z-index: 50;
    }
    #death-box {
      background: rgba(20,0,0,0.9); border-radius: 14px;
      padding: 30px 44px; text-align: center; color: #fff;
    }
    #death-box h2 { font-size: 1.6rem; margin-bottom: 8px; }
    #death-box p { color: #faa; font-size: 1rem; }
  </style>
</head>
<body>
  <!-- Lobby -->
  <div id="lobby">
    <div id="lobby-box">
      <h1>LITTLEWAR</h1>
      <p class="sub">Sali a bordo e spara a tutti</p>

      <label for="nickname">Nickname</label>
      <input type="text" id="nickname" maxlength="16" placeholder="Il tuo nome..." />

      <label>Colore aereo</label>
      <div id="color-options"></div>

      <button id="play-btn">GIOCA</button>
      <div id="online-count">Online: …</div>
      <div id="lobby-msg"></div>
    </div>
  </div>

  <!-- HUD (visibile in gioco) -->
  <div id="hud">
    <div id="hud-top">
      <div class="hud-pill" id="hud-kills">Kill: 0</div>
      <div class="hud-pill" id="hud-bombs">Bombe: 0</div>
    </div>
    <div id="hud-bottom">
      <div class="hud-pill" id="hud-weapon">Arma: Lv.0</div>
      <div class="hud-pill" id="hud-shield">Scudo: ✗</div>
      <div class="hud-pill" id="hud-speed">Velocità: 100%</div>
    </div>
    <div id="hud-players">
      <h3>Giocatori</h3>
      <div id="player-list"></div>
    </div>
    <div id="target-arrow">🎯</div>
  </div>

  <!-- Schermata morte -->
  <div id="death-screen">
    <div id="death-box">
      <h2 id="death-msg">Sei stato eliminato!</h2>
      <p id="death-countdown">Respawn in 3…</p>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
